<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sninne</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    .bg {
      height: 100%;
      background: url("sninne.png") center/cover no-repeat;
    }

    #videoWrap {
      position: fixed;
      inset: 0;
      display: none;
      background: rgba(0, 0, 0, 0.7);
      align-items: center;
      justify-content: center;
    }

    #videoWrap video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div id="videoWrap">
    <video id="secretVideo" playsinline loop>
      <source src="sninne.mp4" type="video/mp4">
    </video>
  </div>

  <script>
    const code = [
      "ArrowUp", "ArrowUp", "ArrowDown", "ArrowDown",
      "ArrowLeft", "ArrowRight", "ArrowLeft", "ArrowRight",
      "b", "a", "Enter"
    ];

    let pos = 0;

    const videoWrap = document.getElementById("videoWrap");
    const video = document.getElementById("secretVideo");

    function triggerLoop() {
      videoWrap.style.display = "flex";
      video.currentTime = 0;
      video.play();
    }

    window.addEventListener("keydown", (e) => {
      let token = e.key;

      if (token === "b" || token === "B") token = "b";
      else if (token === "a" || token === "A") token = "a";

      if (token === code[pos]) {
        pos++;
        if (pos === code.length) {
          pos = 0;
          triggerLoop();
        }
      } else {
        pos = 0;
      }
    });
  </script>
</body>

</html>
